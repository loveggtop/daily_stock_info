<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📈 일일 주식 보고서 게시판</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#ffa657;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
header h1{font-size:19px;font-weight:700}
.live{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.4)}
.sub{font-size:12px;color:var(--muted);margin-left:auto}
.wrap{max-width:1100px;margin:0 auto;padding:24px 16px}
.mkt{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:28px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.mc .lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.mc .val{font-size:20px;font-weight:700}
.mc .chg{font-size:12px;margin-top:2px}
.up{color:var(--red)}.down{color:var(--blue)}.flat{color:var(--muted)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:22px}
.tab{padding:10px 18px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:.15s}
.tab:hover{color:var(--text)}.tab.on{color:var(--text);border-bottom-color:var(--orange)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:border-color .15s,transform .1s;text-decoration:none;color:inherit;display:block;position:relative}
.card:hover{border-color:var(--blue);transform:translateY(-2px)}
.card .dt{font-size:11px;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.card .ti{font-size:15px;font-weight:700;margin-bottom:9px;line-height:1.4;padding-right:22px}
.card .sm{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:11px}
.card .tgs{display:flex;flex-wrap:wrap;gap:5px}
.tg{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tg-m{background:rgba(255,166,87,.15);color:var(--orange)}
.tg-c{background:rgba(88,166,255,.15);color:var(--blue)}
.tg-h{background:rgba(248,81,73,.15);color:var(--red)}
.tg-g{background:rgba(63,185,80,.15);color:var(--green)}
.delBtn{position:absolute;top:12px;right:12px;width:22px;height:22px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);border-radius:6px;font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.delBtn:hover:not(:disabled){background:var(--red);color:#fff;border-color:var(--red)}
.delBtn:disabled{opacity:.4;cursor:not-allowed}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
.ov.open{display:flex}
.mod{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:820px;padding:28px;position:relative}
.cls{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
.sec{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 10px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:500}
td{padding:9px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
.op{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.op-b{background:rgba(248,81,73,.15);color:var(--red)}.op-h{background:rgba(88,166,255,.15);color:var(--blue)}
.thm{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:13px 15px;margin-bottom:9px}
.thm .nm{font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:5px}
.thm .sk{font-size:12px;color:var(--muted)}.thm .rs{font-size:12px;margin-top:3px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .ic{font-size:48px;margin-bottom:10px}
hr{border:none;border-top:1px solid var(--border);margin:14px 0}
@media(max-width:600px){.grid{grid-template-columns:1fr}.mkt{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <span style="font-size:22px">📈</span>
  <h1>일일 주식 보고서</h1>
  <span class="live">LIVE</span>
  <span class="sub" id="upd">업데이트: —</span>
</header>
<div class="wrap">
  <div class="mkt">
    <div class="mc"><div class="lbl">KOSPI</div><div class="val" id="kv">—</div><div class="chg" id="kc">—</div></div>
    <div class="mc"><div class="lbl">KOSDAQ</div><div class="val" id="qv">—</div><div class="chg" id="qc">—</div></div>
    <div class="mc"><div class="lbl">DOW</div><div class="val" id="dv">—</div><div class="chg" id="dc">—</div></div>
    <div class="mc"><div class="lbl">NASDAQ</div><div class="val" id="nv">—</div><div class="chg" id="nc">—</div></div>
    <div class="mc"><div class="lbl">USD/KRW</div><div class="val" id="uv">—</div><div class="chg" id="uc">—</div></div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="fil('all',this)">전체</div>
    <div class="tab" onclick="fil('morning',this)">📌 모닝 브리핑</div>
    <div class="tab" onclick="fil('close',this)">🔔 장마감 보고서</div>
  </div>
  <div class="grid" id="grid">
    <div class="empty" id="emp"><div class="ic">📭</div><p>아직 보고서가 없습니다.<br>첫 보고서는 오전 8시에 자동 게시됩니다.</p></div>
  </div>
</div>
<div class="ov" id="ov" onclick="cls(event)">
  <div class="mod"><button class="cls" onclick="cls()">✕</button><div id="mc2"></div></div>
</div>
<script>
const GH_OWNER="loveggtop";
const GH_REPO="daily_stock_info";
const GH_INDEX_PATH="reports/index.json";
let all=[];
async function load(){
  try{
    const r=await fetch('./reports/index.json?t='+Date.now());
    if(!r.ok)return;
    all=await r.json();
    all.sort((a,b)=>b.date.localeCompare(a.date));
    render(all);
    document.getElementById('upd').textContent='업데이트: '+all[0]?.date?.slice(0,16).replace('T',' ');
    if(all[0]?.market)mkt(all[0].market);
  }catch(e){}
}
function mkt(m){
  [['k','kospi'],['q','kosdaq'],['d','dow'],['n','nasdaq'],['u','usd']].forEach(([p,k])=>{
    const d=m[k];if(!d)return;
    document.getElementById(p+'v').textContent=d.value||'—';
    const el=document.getElementById(p+'c');
    const s=d.change>=0?'+':'';
    el.textContent=s+d.change+' ('+s+d.pct+'%)';
    el.className='chg '+(d.change>0?'up':d.change<0?'down':'flat');
  });
}
function render(rs){
  const g=document.getElementById('grid');
  document.getElementById('emp').style.display=rs.length?'none':'block';
  g.innerHTML=rs.map(r=>`<a class="card" href="#" onclick="open2('${r.file}');return false;"><button class="delBtn" onclick="event.stopPropagation();deleteReport('${r.file}',this)" title="삭제">✕</button><div class="dt"><span>${r.date.slice(0,10)}</span>${r.type==='morning'?'<span class="tg tg-m">모닝</span>':'<span class="tg tg-c">장마감</span>'}</div><div class="ti">${r.title}</div><div class="sm">${r.summary}</div><div class="tgs">${(r.tags||[]).map(t=>`<span class="tg tg-${t.s}">${t.l}</span>`).join('')}</div></a>`).join('');
}
function fil(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on');
  render(t==='all'?all:all.filter(r=>r.type===t));
}
async function open2(f){
  const o=document.getElementById('ov'),c=document.getElementById('mc2');
  c.innerHTML='<p style="color:var(--muted);text-align:center;padding:40px">로딩 중...</p>';
  o.classList.add('open');document.body.style.overflow='hidden';
  try{
    const d=await(await fetch('./reports/'+f+'?t='+Date.now())).json();
    const fc=(v,p)=>{const s=v>=0?'+':'';const cl=v>0?'up':v<0?'down':'flat';return`<span class="${cl}">${s}${v?.toLocaleString()}(${s}${p}%)</span>`;};
    const hr=(d.holdings||[]).map(h=>`<tr><td><b>${h.name}</b></td><td>${h.currentPrice?.toLocaleString()||'—'}</td><td>${fc(h.change,h.changePct)}</td><td>${h.targetPrice?.toLocaleString()||'—'}</td><td><span class="op ${h.opinion==='매수'||h.opinion==='강력매수'?'op-b':'op-h'}">${h.opinion||'—'}</span></td><td style="font-size:11px;color:var(--muted)">${h.comment||''}</td></tr>`).join('');
    const th=(d.themes||[]).map(t=>`<div class="thm"><div class="nm"><span class="tg tg-h">🔥 주도</span><span>${t.name}</span><span style="margin-left:auto" class="up">▲${t.momentum}</span></div><div class="sk">관련: ${(t.stocks||[]).join(', ')}</div><div class="rs">${t.reason}</div></div>`).join('');
    const kp=(d.keyPoints||[]).map(p=>`<div style="display:flex;gap:8px;margin-bottom:8px;font-size:13px;line-height:1.6"><span style="color:var(--orange)">▸</span><span>${p}</span></div>`).join('');
    c.innerHTML=`<h2 style="font-size:19px;margin-bottom:5px">${d.title}</h2><div style="font-size:12px;color:var(--muted);margin-bottom:18px">${d.date}  |  ${d.type==='morning'?'📌 모닝 브리핑':'🔔 장마감 보고서'}</div>${d.marketSummary?`<div class="sec">📊 시장 요약</div><p style="font-size:13px;line-height:1.8;margin-bottom:14px">${d.marketSummary}</p><hr>`:''}${hr?`<div class="sec">💼 보유 종목 현황</div><table><thead><tr><th>종목</th><th>현재가</th><th>등락</th><th>목표가</th><th>의견</th><th>코멘트</th></tr></thead><tbody>${hr}</tbody></table><hr>`:''}${th?`<div class="sec">🚀 주도 테마</div>${th}<hr>`:''}${kp?`<div class="sec">📌 핵심 포인트</div>${kp}`:''}`;
  }catch(e){c.innerHTML='<p style="color:var(--red)">로드 실패</p>';}
}
function cls(e){
  if(e&&e.target!==document.getElementById('ov')&&!e.target.classList.contains('cls'))return;
  document.getElementById('ov').classList.remove('open');document.body.style.overflow='';
}
function b64EncodeUnicode(str){const bytes=new TextEncoder().encode(str);let bin='';bytes.forEach(b=>bin+=String.fromCharCode(b));return btoa(bin);}
function b64DecodeUnicode(b64){const bin=atob(b64.replace(/\n/g,''));const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new TextDecoder('utf-8').decode(bytes);}
async function deleteReport(file,btn){
  const rep=all.find(r=>r.file===file);
  if(!confirm('"'+(rep?rep.title:file)+'"\n보고서를 삭제하시겠습니까?\n(GitHub 저장소에서 즉시 삭제됩니다)'))return;
  let token=localStorage.getItem('gh_pat');
  if(!token){
    token=prompt('GitHub Personal Access Token을 입력하세요.\n(이 브라우저에 저장되어 다음부터는 다시 묻지 않습니다)');
    if(!token)return;
    localStorage.setItem('gh_pat',token);
  }
  btn.disabled=true;btn.textContent='…';
  try{
    const idxUrl='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_INDEX_PATH;
    const getResp=await fetch(idxUrl,{headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}});
    const getData=await getResp.json();
    if(!getResp.ok)throw new Error(getData.message||'목록 조회 실패 (status '+getResp.status+')');
    const sha=getData.sha;
    const decoded=b64DecodeUnicode(getData.content);
    let arr=JSON.parse(decoded);
    const beforeLen=arr.length;
    arr=arr.filter(r=>r.file!==file);
    if(arr.length===beforeLen){localStorage.removeItem('gh_pat');throw new Error('원격 목록에서 해당 항목을 찾지 못했습니다 (이미 삭제되었거나 토큰이 잘못되었을 수 있습니다)');}
    const newBase64=b64EncodeUnicode(JSON.stringify(arr,null,2));
    const putResp=await fetch(idxUrl,{method:'PUT',headers:{Authorization:'token '+token,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'},body:JSON.stringify({message:'보고서 삭제: '+file,content:newBase64,sha:sha})});
    const putData=await putResp.json();
    if(!putResp.ok){if(putResp.status===401)localStorage.removeItem('gh_pat');throw new Error(putData.message||'업로드 실패 (status '+putResp.status+')');}
    try{
      const fileUrl='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/reports/'+file;
      const fGet=await fetch(fileUrl,{headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}});
      if(fGet.ok){
        const fData=await fGet.json();
        await fetch(fileUrl,{method:'DELETE',headers:{Authorization:'token '+token,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'},body:JSON.stringify({message:'보고서 파일 삭제: '+file,sha:fData.sha})});
      }
    }catch(e2){}
    all=all.filter(r=>r.file!==file);
    fil('all',document.querySelector('.tab.on')||document.querySelector('.tab'));
    alert('삭제되었습니다. GitHub Pages에는 1~2분 후 반영됩니다.');
  }catch(e){
    alert('삭제 실패: '+e.message);
    btn.disabled=false;btn.textContent='✕';
  }
}
load();
</script>
</body></html>
